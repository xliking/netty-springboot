# Spring Boot Web 配置
server:
  port: 8081

# Spring 配置
spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Jackson 配置
  jackson:
    # 日期时间格式化
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    # LocalDateTime 序列化格式
    serialization:
      write-dates-as-timestamps: false
  # Redis 配置
  data:
    redis:
      # Redis 地址
      host: 127.0.0.1
      # Redis 端口
      port: 6379
      # Redis 数据库索引（默认为0）
      database: 0
      # Redis 密码（如果没有设置可以省略）
      # password: your_redis_password
      # 连接超时时间
      timeout: 10000ms
      lettuce:
        pool:
          # 最大连接数（负值表示不限制）
          max-active: 8
          # 最大阻塞等待时间（负值表示不限制）
          max-wait: -1ms
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  enableLogicDelete: true
  mapperPackage: xlike.top.**.mapper
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: xlike.top.nettydemo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token 配置
sa-token:
  # token 名称（同时用于Cookie、Header、Query参数传递）
  token-name: "nettyTest"
  # token 有效期（单位秒，默认30天）
  timeout: 2592000
  # token 最低活跃时间（单位秒，超过时间未访问则过期，-1表示不限制）
  active-timeout: 1800
  # 是否允许同账号多地同时登录（true=允许）
  is-concurrent: true
  # 是否共用一个 token（true=共用，false=每次登录生成新token）
  is-share: false
  # token 生成样式
  token-style: "uuid"
  # 是否输出操作日志
  is-log: true
  # token 持久化方式（使用 Redis + Jackson 存储）
  dao: sa-token-dao-redis-jackson

# Netty 配置
netty:
  # Netty 服务端口
  port: 8090
  # Boss 线程数（默认1）
  boss-threads: 1
  # Worker 线程数（默认0，Netty会取CPU核心数*2）
  worker-threads: 0
  # WebSocket 路径
  websocket-path: "/ws"
  # 读空闲超时时间（秒）
  reader-idle-seconds: 45
  # 写空闲超时时间（秒）
  writer-idle-seconds: 20
  # WebSocket 单帧最大长度（1MB）
  max-ws-frame-size: 1048576
  # 连接队列大小
  backlog: 1024
  # 是否开启 TCP Nagle 算法（true=关闭延迟，减少延迟）
  tcp-no-delay: true
  # 是否开启 TCP SO_KEEPALIVE 心跳机制
  so-keep-alive: true
  # 写缓冲区低水位（32KB）
  write-buffer-watermark-low: 32768
  # 写缓冲区高水位（64KB）
  write-buffer-watermark-high: 65536
